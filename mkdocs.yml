site_name: Platform Engineering.

nav:
  - Home: index.md
  - Kubernetes:
      - Fundamentals: Kubernetes/01KubernetesFundamental.md
      - Kubernetes Command: Kubernetes/Kubernetes.md
  - Platform Engineering:
      - Fundamentals: PlatformEngineering.md
  - Linux:
      - Fundamentals: Linux/Fundamental.md
  - Cloud Engineering:
      - Fundamentals: CloudEngineering.md
  - DevOps:
      - Fundamentals: DevOps/01DevOpsFundamentl.md
  - Hands-On:
      - Fundamentals: HandsOn.md
  - Interview Questions:
      - Fundamentals: InterviewQuestions.md


markdown_extensions:
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
theme:
  name: material
  palette:
    - scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.path
    - toc.follow
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.code.expand
    - content.code.mermaid
#    - toc.integrate
#    - header.autohide
extra_css:
  - css/custom.css